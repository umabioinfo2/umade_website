name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Optional: fetch full history if needed for metadata
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll (optional)
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site
        # Remove this step if you're not using Jekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # If using Jekyll build above, change path to './_site'
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
