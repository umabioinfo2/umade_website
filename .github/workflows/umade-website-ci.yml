name: Umade Website CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '**.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  DEPLOY_PATH: '/var/www/umade'

jobs:
  # ==========================================
  # JOB 1: Lint & Validate HTML/CSS/JS
  # ==========================================
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linters
        run: |
          npm install -g htmlhint stylelint eslint

      - name: Validate HTML Files
        run: |
          echo "Validating HTML files..."
          htmlhint "**/*.html" --config .htmlhintrc || true

      - name: Validate CSS Files
        run: |
          echo "Validating CSS files..."
          stylelint "**/*.css" --config .stylelintrc || true

      - name: Validate JS Files
        run: |
          echo "Validating JavaScript files..."
          eslint "**/*.js" --config .eslintrc || true

      - name: Check for Broken Internal Links
        run: |
          echo "Checking internal links..."
          grep -oP 'href="[^http][^"]*"' **/*.html | sed 's/href="//;s/"$//' | sort -u | while read link; do
            if [[ "$link" == \#* ]] || [[ "$link" == javascript* ]]; then
              continue
            fi
            clean_link=$(echo "$link" | sed 's/?.*//;s/#.*//')
            if [ ! -z "$clean_link" ] && [ ! -f "$clean_link" ] && [ ! -d "$clean_link" ]; then
              echo "Potentially broken link: $link"
            fi
          done
        continue-on-error: true

  # ==========================================
  # JOB 2: Language File Integrity Check
  # ==========================================
  language-check:
    name: Language File Integrity
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate Translation Structure
        run: |
          echo "Checking language translation files..."
          node -e "
          const fs = require('fs');
          const files = fs.readdirSync('.').filter(f => f.endsWith('.js'));

          files.forEach(file => {
            const content = fs.readFileSync(file, 'utf8');
            if (content.includes('translations') || content.includes('data-lang')) {
              console.log('Checking:', file);
              const issues = [];

              const dataLangMatches = content.match(/data-lang=[\\"'][^\\"']*/g) || [];
              dataLangMatches.forEach(match => {
                const quote = match.charAt(9);
                const endQuote = match.charAt(match.length - 1);
                if (quote !== endQuote && !match.endsWith(quote)) {
                  issues.push('Unclosed data-lang attribute: ' + match);
                }
              });

              if (content.match(/<data-lang=/)) {
                issues.push('Found malformed <data-lang= tag (missing element name)');
              }

              const transMatch = content.match(/const translations = ({[\\s\\S]*?});/);
              if (transMatch) {
                try {
                  const transObj = eval('(' + transMatch[1] + ')');
                  const langs = Object.keys(transObj);
                  console.log('Languages found:', langs.join(', '));

                  const firstLang = langs[0];
                  const firstKeys = JSON.stringify(Object.keys(transObj[firstLang]));
                  langs.forEach(lang => {
                    const keys = JSON.stringify(Object.keys(transObj[lang]));
                    if (keys !== firstKeys) {
                      issues.push('Key mismatch in language: ' + lang);
                    }
                  });
                } catch(e) {
                  issues.push('Could not parse translations object');
                }
              }

              if (issues.length > 0) {
                issues.forEach(issue => console.log('  ERROR:', issue));
              } else {
                console.log('  OK - No issues found');
              }
            }
          });
          "

      - name: Check Translation Key Coverage
        run: |
          echo "Checking translation key coverage across HTML and JS..."
          node -e "
          const fs = require('fs');
          const htmlFiles = fs.readdirSync('.').filter(f => f.endsWith('.html'));
          const htmlKeys = new Set();

          htmlFiles.forEach(file => {
            const content = fs.readFileSync(file, 'utf8');
            const matches = content.match(/data-lang=[\\"']([^\\"']+)[\\"']/g) || [];
            matches.forEach(match => {
              const key = match.replace(/data-lang=[\\"']/g, '').replace(/[\\"']$/g, '');
              htmlKeys.add(key);
            });
          });

          console.log('data-lang keys found in HTML:', htmlKeys.size);
          htmlKeys.forEach(key => console.log('  -', key));
          "

  # ==========================================
  # JOB 3: Build & Minify Assets
  # ==========================================
  build:
    name: Build & Minify
    runs-on: ubuntu-latest
    needs: [lint-and-validate, language-check]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Build Tools
        run: |
          npm install -g html-minifier-terser clean-css-cli terser

      - name: Create Build Directory
        run: mkdir -p dist

      - name: Copy Source Files
        run: |
          cp -r *.html css/ js/ pages/ images/ dist/ 2>/dev/null || true

      - name: Minify HTML
        run: |
          echo "Minifying HTML files..."
          find dist -name "*.html" -exec html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --remove-style-link-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true \
            -o {} {} \\;

      - name: Minify CSS
        run: |
          echo "Minifying CSS files..."
          find dist -name "*.css" -exec cleancss -o {} {} \\;

      - name: Minify JavaScript
        run: |
          echo "Minifying JavaScript files..."
          find dist -name "*.js" ! -name "lang.js" -exec terser \
            --compress \
            --mangle \
            --output {} {} \\;

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umade-website-build
          path: dist/
          retention-days: 7

  # ==========================================
  # JOB 4: Deploy to Production (Main Branch)
  # ==========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://umade.com
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: umade-website-build
          path: dist

      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1

      - name: Verify Deployment
        run: |
          echo "Deployment completed!"
          echo "Website: https://umade.com"
          echo "Deployed to: ${{ env.DEPLOY_PATH }}"

  # ==========================================
  # JOB 5: Deploy to Staging (Develop Branch)
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-validate, language-check]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.umade.com
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Staging URL: https://staging.umade.com"

  # ==========================================
  # JOB 6: Notify on Completion
  # ==========================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production, deploy-staging]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy-production.result }}" == "success" ] || [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
          fi
